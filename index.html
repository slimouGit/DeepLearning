<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilderkennung mit ml5</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body>
  <main class="container">
    <h1>Bilderkennung mit ml5</h1>
    <p class="hint">
      Wähle ein Bild aus. Die Klassifikation wird erst nach Klick auf den Button gestartet.
    </p>

    <div class="card">
      <input
        type="file"
        id="imageUpload"
        accept="image/jpeg,image/png,image/webp"
      />

      <div class="image-wrapper">
        <img id="previewImage" alt="Vorschau" hidden />
        <div id="placeholder">Noch kein Bild ausgewählt</div>
      </div>

      <div class="button-row">
        <button id="classifyButton" disabled>Klassifikation starten</button>
      </div>

      <div class="result">
        <p><strong>Status:</strong> <span id="status">Modell wird geladen...</span></p>
        <p><strong>Ergebnis:</strong> <span id="label">-</span></p>
        <p><strong>Confidence:</strong> <span id="confidence">-</span></p>
      </div>

      <div class="chart-section">
        <div class="chart-header">
          <h2>Confidence-Verteilung</h2>
          <label for="chartType">Diagrammtyp:</label>
          <select id="chartType">
            <option value="bar">Balken</option>
            <option value="pie">Pie</option>
            <option value="doughnut">Doughnut</option>
            <option value="polarArea">Polar Area</option>
            <option value="radar">Radar</option>
          </select>
        </div>
        <p id="chartStatus" class="chart-status">Diagramm wird nach der Klassifikation angezeigt.</p>
        <div class="chart-wrapper">
          <canvas id="resultChart" aria-label="Klassifikationsergebnisse als Diagramm"></canvas>
          <div id="chartFallback" class="chart-fallback" hidden></div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
