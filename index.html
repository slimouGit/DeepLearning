<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilderkennung mit ml5</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>
<body>
  <main class="container">
    <h1>Bilderkennung mit ml5</h1>
    <p class="hint">
      Wähle ein Bild aus. Es wird danach automatisch klassifiziert.
    </p>

    <div class="card">
      <input
        type="file"
        id="imageUpload"
        accept="image/jpeg,image/png,image/webp"
      />

      <div class="image-wrapper">
        <img id="previewImage" alt="Vorschau" hidden />
        <div id="placeholder">Noch kein Bild ausgewählt</div>
      </div>

      <div class="result">
        <p><strong>Status:</strong> <span id="status">Modell wird geladen...</span></p>
        <p><strong>Ergebnis:</strong> <span id="label">-</span></p>
        <p><strong>Confidence:</strong> <span id="confidence">-</span></p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
